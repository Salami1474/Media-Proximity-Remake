<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - Media Proximity Group</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="images/Media-Proximity-Logo.png" />
  </head>

  <body>
    <header>
      <div id="mp-logo-container">
        <a href="index.html">
          <img
            src="images/Media-Proximity-Logo.png"
            alt="Media Proximity Group Logo"
            width="60%"
            height="60%" />
        </a>
      </div>

      <nav>
        <ul id="nav-links">
          <li class="nav-item">
            <a href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a href="who-we-are.html">Who We Are</a>
          </li>
          <li class="nav-item">
            <a href="works.html">Our Works</a>
          </li>
          <li class="nav-item">
            <a href="feedback.html">Feedback</a>
          </li>
        </ul>
        <div id="mp-image">
          <img
            src="images/Media-Proximity-Logo.png"
            alt="Media Proximity Group Logo"
            width="35%"
            height="35%" />
        </div>
      </nav>
      <h1>What Do You Think About Us?</h1>
    </header>
    <main>
      <h2>What Do You Think About Us?</h2>
      <p>Please fill the form so we can see your feedback.</p>
      <section>
        <div class="info">
          <form id="media-proximity-feedback-form" method="get">
            <fieldset form="user-info">
              <legend><strong>User Contact Info</strong></legend>
              <label for="name">Full Name:</label>
              <input type="text" id="name" name="name" required />

              <label for="email">Email Address:</label>
              <input type="email" id="email" name="email" required />

              <label for="phone">Phone Number:</label>
              <input type="tel" id="phone" name="phone" />

              <label for="message">Message:</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required></textarea>

              <button type="submit" style="margin-bottom: 40px">
                Send Message
              </button>
              <button type="reset">Reset</button>
            </fieldset>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
